services:
  # mongodb:
  #   image: mongo:7
  #   container_name: mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/.env:/app/.env
    env_file:
      - ./backend/.env
    # depends_on:
    #   - mongodb

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - BACKEND_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
